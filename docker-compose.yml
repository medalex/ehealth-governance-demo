services:

  # ── Autoheal — перезапускает unhealthy контейнеры с меткой autoheal=true ───────
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15
      AUTOHEAL_START_PERIOD: 360
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── DKG blockchain node ───────────────────────────────────────────────────────
  dkg-node:
    image: ghcr.io/medalex/dkg-node:latest
    pull_policy: always
    restart: unless-stopped
    labels:
      autoheal: "true"
    ports:
      - "8900:8900"
      - "8545:8545"
    mem_limit: 8g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8900/info && curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' | grep -q '0x7a69'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 360s     # DKG node boots 2-5 min (Rosetta) — keep "starting" so autoheal won't reset it mid-boot

  # ── PostgreSQL (for mfssia) ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mfssia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MFSSIA — DKG client + governance API ─────────────────────────────────────
  mfssia-ehealth:
    image: ghcr.io/medalex/mfssia-ehealth:latest
    pull_policy: always
    ports:
      - "4000:4000"
    environment:
      APP_PORT: 4000
      DKG_HOSTNAME: http://dkg-node
      DKG_PORT: 8900
      DKG_BLOCKCHAIN_NAME: hardhat1:31337
      DKG_BLOCKCHAIN_RPC: http://dkg-node:8545
      DKG_ENVIRONMENT: development
      PUBLIC_KEY: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mfssia?sslmode=disable
      DATABASE_MIGRATIONS_RUN: "true"
    depends_on:
      dkg-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ZKP Prover ────────────────────────────────────────────────────────────────
  zkp-prover:
    image: ghcr.io/medalex/ehealth-zkp-prover:latest
    pull_policy: always
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── EVM: dedicated chain (separate from DKG) — Groth16 verifier, decision registry, DAO ──
  evm:
    image: ghcr.io/medalex/ehealth-evm:latest
    pull_policy: always
    environment:
      DAO_MEMBERS: 3      # number of DAO voters (first N dev accounts)
      DAO_PERCENT: 60     # quorum as % of members → threshold = ceil(members * percent / 100)
    ports:
      - "8546:8546"   # dedicated EVM RPC
      - "3010:3010"   # HTTP API
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend APIs ──────────────────────────────────────────────────────────────
  patient-api:
    image: ghcr.io/medalex/ehealth-patient-api:latest
    pull_policy: always
    ports:
      - "3001:3001"
    depends_on:
      mfssia-ehealth:
        condition: service_healthy

  lab-api:
    image: ghcr.io/medalex/ehealth-lab-api:latest
    pull_policy: always
    ports:
      - "3002:3002"
    environment:
      MfssiaUrl: "http://mfssia-ehealth:4000/api"
      PatientApiUrl: "http://patient-api:3001"
      LabOrganizationId: "lab-1"
    depends_on:
      mfssia-ehealth:
        condition: service_healthy
      patient-api:
        condition: service_started

  hospital-api:
    image: ghcr.io/medalex/ehealth-hospital-api:latest
    pull_policy: always
    ports:
      - "3003:3003"
    environment:
      ZkpProverUrl: "http://zkp-prover:3005"
      LabServiceUrl: "http://lab-api:3002"
      MfssiaUrl: "http://mfssia-ehealth:4000/api"
      PatientApiUrl: "http://patient-api:3001"
      HospitalId: "hospital-1"
    depends_on:
      mfssia-ehealth:
        condition: service_healthy
      zkp-prover:
        condition: service_started
      lab-api:
        condition: service_started
      patient-api:
        condition: service_started

  pharmacy-api:
    image: ghcr.io/medalex/ehealth-pharmacy-api:latest
    pull_policy: always
    ports:
      - "3004:3004"
    environment:
      PatientApiUrl: "http://patient-api:3001"
      MfssiaUrl: "http://mfssia-ehealth:4000/api"
      DecisionRegistryUrl: "http://evm:3010"
      PharmacyOrganizationId: "pharmacy-1"
    depends_on:
      mfssia-ehealth:
        condition: service_healthy
      zkp-prover:
        condition: service_started
      patient-api:
        condition: service_started
      evm:
        condition: service_started

  # ── Frontend apps ─────────────────────────────────────────────────────────────
  patient-app:
    image: ghcr.io/medalex/ehealth-patient-app:latest
    pull_policy: always
    ports:
      - "3008:80"

  lab-app:
    image: ghcr.io/medalex/ehealth-lab-app:latest
    pull_policy: always
    ports:
      - "3009:80"

  hospital-app:
    image: ghcr.io/medalex/ehealth-hospital-app:latest
    pull_policy: always
    ports:
      - "3006:80"

  pharmacy-app:
    image: ghcr.io/medalex/ehealth-pharmacy-app:latest
    pull_policy: always
    ports:
      - "3007:80"

  # ── Monitor + Governance UI ───────────────────────────────────────────────────
  ehealth-governance:
    image: ghcr.io/medalex/ehealth-demo-ui:latest
    pull_policy: always
    ports:
      - "3000:80"
