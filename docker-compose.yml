version: "3.9"

networks:
  ehealth-net:
    driver: bridge

services:

  # ── DKG Node ─────────────────────────────────────────────────────────────────
  dkg-node:
    image: ${DKG_NODE_IMAGE}
    ports:
      - "8900:8900"
      - "8545:8545"
    mem_limit: 8g
    networks:
      - ehealth-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/info"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── PostgreSQL (for mfssia-ehealth) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mfssia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - ehealth-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── mfssia-ehealth (DKG client + governance API) ─────────────────────────────
  mfssia-ehealth:
    image: ${MFSSIA_EHEALTH_IMAGE}
    ports:
      - "4000:4000"
    environment:
      APP_PORT: 4000
      DKG_HOSTNAME: http://dkg-node
      DKG_PORT: 8900
      PUBLIC_KEY: ${WALLET_PUBLIC_KEY}
      PRIVATE_KEY: ${WALLET_PRIVATE_KEY}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mfssia?sslmode=disable
      DATABASE_MIGRATIONS_RUN: "true"
    networks:
      - ehealth-net
    depends_on:
      dkg-node:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── ZKP Prover ───────────────────────────────────────────────────────────────
  zkp-prover:
    image: ${ZKP_PROVER_IMAGE}
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
    networks:
      - ehealth-net

  # ── Legacy Systems ────────────────────────────────────────────────────────────
  patient:
    image: ${PATIENT_SERVICE_IMAGE}
    ports:
      - "3001:3001"
    environment:
      ASPNETCORE_URLS: http://+:3001
      MFSSIA_URL: http://mfssia-ehealth:4000/api
    networks:
      - ehealth-net
    depends_on:
      - mfssia-ehealth

  lab:
    image: ${LAB_SERVICE_IMAGE}
    ports:
      - "3002:3002"
    environment:
      ASPNETCORE_URLS: http://+:3002
      MFSSIA_URL: http://mfssia-ehealth:4000/api
    networks:
      - ehealth-net
    depends_on:
      - mfssia-ehealth

  hospital:
    image: ${HOSPITAL_SERVICE_IMAGE}
    ports:
      - "3003:3003"
    environment:
      ASPNETCORE_URLS: http://+:3003
      PATIENT_SERVICE_URL: http://patient:3001
      LAB_SERVICE_URL: http://lab:3002
      ZKP_PROVER_URL: http://zkp-prover:3005
      MFSSIA_URL: http://mfssia-ehealth:4000/api
    networks:
      - ehealth-net
    depends_on:
      - mfssia-ehealth
      - patient
      - lab
      - zkp-prover

  pharmacy:
    image: ${PHARMACY_SERVICE_IMAGE}
    ports:
      - "3004:3004"
    environment:
      ASPNETCORE_URLS: http://+:3004
      HOSPITAL_SERVICE_URL: http://hospital:3003
      ZKP_PROVER_URL: http://zkp-prover:3005
    networks:
      - ehealth-net
    depends_on:
      - hospital
      - zkp-prover
